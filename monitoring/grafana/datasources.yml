apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: db:5432
    database: krishiai
    user: krishiai
    secureJsonData:
      password: krishiai
    jsonData:
      sslmode: disable
