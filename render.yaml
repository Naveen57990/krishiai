services:
  - type: web
    name: krishiai-backend
    env: python
    region: singapore
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: cd backend && pip install -r requirements-prod.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: krishiai-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: krishiai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

databases:
  - name: krishiai-db
    plan: free
    region: singapore
    databaseName: krishiai
    user: krishiai
    ipAllowList: []
